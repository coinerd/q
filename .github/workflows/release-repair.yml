name: Release Repair

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to inspect, e.g. v0.99.40'
        required: true
        type: string
      mode:
        description: 'Diagnostic mode (dry-run only for existing tags)'
        required: true
        type: choice
        options:
          - dry-run
        default: dry-run

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      result: ${{ steps.result.outputs.RESULT }}
      is-unpublished: ${{ steps.check.outputs.IS_UNPUBLISHED }}
    steps:
      - name: Checkout exact tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: ./.github/actions/setup-racket

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Verify version consistency
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CANONICAL=$(racket -e '(require "util/version.rkt") (display q-version)')
          echo "Tag version: $VERSION"
          echo "Canonical:   $CANONICAL"
          if [ "$VERSION" != "$CANONICAL" ]; then
            echo "ERROR: Tag/version mismatch — refusing to proceed"
            exit 1
          fi
          echo "Version match OK"

      - name: Check if tag has a release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "Checking release status for ${TAG}..."
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" 2>/dev/null || echo "not-found")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "IS_UNPUBLISHED=false" >> $GITHUB_OUTPUT
            echo "Release exists for tag ${TAG}"
          else
            echo "IS_UNPUBLISHED=true" >> $GITHUB_OUTPUT
            echo "No release found for tag ${TAG} (unpublished)"
          fi

      - name: Run diagnostics
        id: diagnostics
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.event.inputs.tag }}"
          echo "Running release diagnostics for $TAG"
          racket scripts/release-repair.rkt --tag "$TAG" --mode dry-run

      - name: Build tarball (for unpublished tags — will route to release-core)
        if: steps.check.outputs.IS_UNPUBLISHED == 'true'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p /tmp/release
          cp -r . /tmp/release/q/
          cd /tmp/release
          tar czf "q-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='compiled' \
            --exclude='*.zo' \
            q/
          ls -la "q-${VERSION}.tar.gz"

      - name: Upload build artifact (for unpublished tags)
        uses: actions/upload-artifact@v7
        if: steps.check.outputs.IS_UNPUBLISHED == 'true'
        with:
          name: q-unpublished-build-${{ steps.version.outputs.VERSION }}
          path: /tmp/release/
          retention-days: 7

      - name: Provide guidance for unpublished tag
        if: steps.check.outputs.IS_UNPUBLISHED == 'true'
        run: |
          echo "## Unpublished Tag Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag ${{ github.event.inputs.tag }} has no release. It needs normal publication:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Push the tag to trigger the normal release pipeline: $(gh run list --workflow release.yml -L 1)" >> $GITHUB_STEP_SUMMARY || true
          echo "2. The build-once pre-publication pipeline will smoke, draft, verify, publish." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Set result
        id: result
        run: |
          IS_UNPUBLISHED="${{ steps.check.outputs.IS_UNPUBLISHED }}"
          if [ "$IS_UNPUBLISHED" = "true" ]; then
            echo "RESULT=unpublished-tag-detected" >> $GITHUB_OUTPUT
          else
            echo "RESULT=dry-run-complete" >> $GITHUB_OUTPUT
          fi
          echo "## Release Repair (Diagnostic)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.event.inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Mode: dry-run" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_UNPUBLISHED" = "true" ]; then
            echo "Status: -> unpublishing-tag-→-release-core-pipeline" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: Existing release — no mutation performed." >> $GITHUB_STEP_SUMMARY
            echo "For a new patch release, create a new tag and push it." >> $GITHUB_STEP_SUMMARY
          fi
