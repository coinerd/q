name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-racket

      - name: Sync README status block
        run: racket scripts/sync-readme-status.rkt --sync

      - name: Sync README metrics markers
        run: racket scripts/metrics.rkt --sync-readme

      - name: Version consistency check
        run: racket scripts/lint-version.rkt

      - name: Run tests
        run: racket scripts/run-tests.rkt --suite fast --jobs 4

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-racket

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CANONICAL=$(racket -e '(require "util/version.rkt") (display q-version)')
          echo "Tag version: $VERSION"
          echo "Canonical:   $CANONICAL"
          [ "$VERSION" = "$CANONICAL" ]

      - name: Build tarball
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p /tmp/q
          cp -r . /tmp/q/
          cd /tmp
          tar czf /tmp/q-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='compiled' \
            --exclude='*.zo' \
            q/

      - name: Generate release manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          racket scripts/gen-release-manifest.rkt /tmp/q-${VERSION}.tar.gz > /tmp/release-manifest.json
          cp /tmp/release-manifest.json .
          cat /tmp/release-manifest.json

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          racket scripts/gen-release-notes.rkt "${VERSION}" > /tmp/release-notes.md
          echo "Generated release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          files: |
            /tmp/q-${{ steps.version.outputs.VERSION }}.tar.gz
            release-manifest.json

  smoke:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Install Racket
        run: |
          curl -L https://download.racket-lang.org/installers/8.10/racket-8.10-x86_64-linux-cs.sh -o /tmp/racket.sh
          echo "2" | sudo sh /tmp/racket.sh --in-place --create-links /usr/local

      - name: Download release tarball
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          ASSET_URL=""
          for i in $(seq 1 10); do
            ASSET_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" \
              | jq -r '.assets[] | select(.name=="q-'"${VERSION}"'.tar.gz") | .url')
            if [ -n "$ASSET_URL" ]; then
              echo "Found tarball asset (attempt $i)"
              break
            fi
            echo "Waiting for tarball asset (attempt $i)..."
            sleep 5
          done
          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: tarball asset not found in release ${TAG}"
            exit 1
          fi
          curl -sfL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            -o "/tmp/q-${VERSION}.tar.gz" "$ASSET_URL"
          ls -la "/tmp/q-${VERSION}.tar.gz"

      - name: Extract and install
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          cd /tmp
          tar xzf "q-${VERSION}.tar.gz"
          cd q
          raco pkg install --auto --batch

      - name: Verify q --version
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          cd /tmp/q
          OUTPUT=$(racket main.rkt --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "version ${VERSION}"

      - name: Verify manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          TAG="${GITHUB_REF#refs/tags/}"
          curl -sfL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            -o /tmp/release-manifest.json \
            "https://api.github.com/repos/${{ github.repository }}/releases/download/${TAG}/release-manifest.json" || true
          if [ -f /tmp/release-manifest.json ] && [ -s /tmp/release-manifest.json ]; then
            python3 -c "
          import json
          m = json.load(open('/tmp/release-manifest.json'))
          assert m['version'] == '${VERSION}', f\"manifest version {m['version']} != expected ${VERSION}\"
          print(f'Manifest OK: version={m[\"version\"]}')
          "
          else
            echo "No release-manifest.json found (optional)"
          fi

      - name: Run test suite
        run: |
          cd /tmp/q
          racket scripts/run-tests.rkt --suite fast --jobs 4
