name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Racket installation
        id: cache-racket
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/racket
            ~/.cache/racket
          key: racket-8.10-ubuntu-${{ runner.os }}

      - name: Install Racket
        if: steps.cache-racket.outputs.cache-hit != 'true'
        run: |
          curl -L https://download.racket-lang.org/installers/8.10/racket-8.10-x86_64-linux-cs.sh -o /tmp/racket.sh
          echo "2" | sudo sh /tmp/racket.sh --in-place --create-links /usr/local

      - name: Install dependencies
        run: |
          /usr/local/racket/bin/raco pkg install --auto --batch
          /usr/local/racket/bin/raco pkg install --auto --batch tui-term tui-ubuf 2>/dev/null || true

      - name: Sync README status block
        run: /usr/local/racket/bin/racket scripts/sync-readme-status.rkt --sync

      - name: Sync README metrics markers
        run: /usr/local/racket/bin/racket scripts/metrics.rkt --sync-readme

      - name: Version consistency check
        run: /usr/local/racket/bin/racket scripts/lint-version.rkt

      - name: Run tests
        run: /usr/local/racket/bin/raco test tests/

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Racket
        run: |
          curl -L https://download.racket-lang.org/installers/8.10/racket-8.10-x86_64-linux-cs.sh -o /tmp/racket.sh
          echo "2" | sudo sh /tmp/racket.sh --in-place --create-links /usr/local

      - name: Install dependencies
        run: |
          /usr/local/racket/bin/raco pkg install --auto --batch

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CANONICAL=$(/usr/local/racket/bin/racket -e '(require "util/version.rkt") (display q-version)')
          echo "Tag version: $VERSION"
          echo "Canonical:   $CANONICAL"
          [ "$VERSION" = "$CANONICAL" ]

      - name: Build tarball
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p /tmp/q
          cp -r . /tmp/q/
          cd /tmp
          tar czf /tmp/q-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='compiled' \
            --exclude='*.zo' \
            q/

      - name: Generate release manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          /usr/local/racket/bin/racket scripts/gen-release-manifest.rkt /tmp/q-${VERSION}.tar.gz > /tmp/release-manifest.json
          cp /tmp/release-manifest.json .
          cat /tmp/release-manifest.json

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          /usr/local/racket/bin/racket scripts/gen-release-notes.rkt "${VERSION}" > /tmp/release-notes.md
          echo "Generated release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          files: |
            /tmp/q-${{ steps.version.outputs.VERSION }}.tar.gz
            release-manifest.json
