name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      racket-version:
        description: 'Racket version override (e.g. 8.11, 8.12)'
        required: false
        default: ''
        type: string

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Gate 1: Lint (< 30s) — fast feedback on every PR
  # ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Protected governance controller tests
        run: python3 -m unittest discover -s scripts/github -p 'test_*.py'

      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-lint-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-lint-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Workflow YAML validation
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, glob, sys
          errors = []
          for f in glob.glob('.github/workflows/*.yml'):
            try: yaml.safe_load(open(f))
            except Exception as e: errors.append(f'{f}: {e}')
          for f in glob.glob('.github/actions/*/action.yml'):
            try: yaml.safe_load(open(f))
            except Exception as e: errors.append(f'{f}: {e}')
          if errors:
            for e in errors: print(f'ERROR: {e}')
            sys.exit(1)
          print('All workflows and actions valid YAML')
          "

      - name: Run all lint checks
        run: racket scripts/lint-all.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 1b: Lint alignment — fail if pre-commit and lint-all drift
  # ────────────────────────────────────────────────────────────
  lint-alignment:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-lint-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-lint-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}
      - name: Verify lint alignment
        run: racket scripts/check-lint-alignment.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 2: Sharded test suite — 3 parallel shards on ubuntu
  # Replaces the old single-job full-suite + redundant inter-wave-gate.
  # All 1039+ fast tests still run; sharding cuts wall-clock 3×.
  # ────────────────────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-test-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-test-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Compile gate (shared deps)
        run: raco make main.rkt

      - name: Run test shard ${{ matrix.shard }}/3
        run: |
          STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt \
            --suite fast --jobs 4 \
            --shard-index ${{ matrix.shard }} --shard-total 3 \
            2>&1 | tee test-output.log

      - name: Test failure summary
        if: failure()
        run: |
          echo "## Test Shard ${{ matrix.shard }} Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 4 'FAILURE\|ERROR' test-output.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-shard-${{ matrix.shard }}
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 2b: Test aggregate — required gate that all shards passed
  # ────────────────────────────────────────────────────────────
  test-aggregate:
    needs: [test, test-platform]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All test shards and platform checks passed."

  # ────────────────────────────────────────────────────────────
  # Gate 2c: macOS platform-cross verification (~5 min, not 66 min)
  # Runs only the curated platform-sensitive tests on macOS instead
  # of the full 1039-file fast suite.
  # ────────────────────────────────────────────────────────────
  test-platform:
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/Library/Racket
          key: racket-pkgs-platform-macos-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-platform-macos-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Compile gate
        run: raco make main.rkt

      - name: Run platform-cross suite
        run: |
          STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt \
            --suite platform --jobs 4 \
            2>&1 | tee test-output.log

      - name: Platform failure summary
        if: failure()
        run: |
          echo "## Platform Test Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 4 'FAILURE\|ERROR' test-output.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload platform test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-platform-macos
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 2d: Racket 8.11 cross-version check (main push only)
  # ────────────────────────────────────────────────────────────
  test-cross-version:
    if: github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-cross-811-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-cross-811-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: '8.11'

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Compile gate
        run: raco make main.rkt

      - name: Run fast suite (Racket 8.11)
        run: |
          STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt \
            --suite fast --jobs 4 \
            2>&1 | tee test-output.log

      - name: Upload cross-version test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-cross-version-811
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 3: Security tier — sandbox/permission/safe-mode tests
  # ────────────────────────────────────────────────────────────
  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-security-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-security-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Run security test suite (parallel)
        run: STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt --suite security --jobs 4 2>&1 | tee test-output.log

      - name: Upload security test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-output
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 4: Release dry-run — depends on lint passing
  # ────────────────────────────────────────────────────────────
  release-dry-run:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-release-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-release-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Build tarball (dry-run)
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          mkdir -p /tmp/q
          cp -r . /tmp/q/
          cd /tmp
          tar czf /tmp/q-${VERSION}.tar.gz \
            --exclude='.git' --exclude='compiled' --exclude='*.zo' q/
          echo "Tarball size: $(du -h /tmp/q-${VERSION}.tar.gz | cut -f1)"

      - name: Verify manifest generation
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          racket scripts/gen-release-manifest.rkt /tmp/q-${VERSION}.tar.gz > /tmp/manifest.json
          python3 -c "import json,sys; m=json.load(open('/tmp/manifest.json')); print(f'Manifest valid: version={m[\"version\"]}')"

      - name: Verify release notes generation
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          racket scripts/gen-release-notes.rkt "${VERSION}" > /tmp/notes.md
          echo "Release notes generated ($(wc -l < /tmp/notes.md) lines)"

  # ────────────────────────────────────────────────────────────
  # Gate 5: Smoke — depends on lint only (not test)
  # ────────────────────────────────────────────────────────────
  smoke:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache Racket packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/share/racket
            ~/Library/Racket
          key: racket-pkgs-smoke-${{ matrix.os }}-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-smoke-${{ matrix.os }}-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Version smoke check
        run: |
          output=$(racket main.rkt --version)
          echo "$output"
          echo "$output" | grep -qE '^q version [0-9]+\.[0-9]+\.[0-9]+$'

      - name: Help smoke check
        run: |
          output=$(racket main.rkt --help)
          echo "$output"
          echo "$output" | grep -qE '^Usage:'

      - name: Provider compilation smoke tests
        run: raco test tests/test-provider-smoke.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 6: Workflow integration suite (parallel)
  # ────────────────────────────────────────────────────────────
  workflows:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Workflow integration suite (parallel)
        run: racket scripts/run-tests.rkt --suite workflows --jobs 2 --timeout 90 2>&1 | tee workflow-output.log

      - name: Workflow failure summary
        if: failure()
        run: |
          echo "## Workflow Test Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 4 'FAILURE\|ERROR' workflow-output.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload workflow log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workflow-test-output
          path: workflow-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 7: GSD wave evidence (current protected wave)
  # Every PR must add exactly one machine-checkable wave record. Pushes to
  # main revalidate the latest retained record.
  # ────────────────────────────────────────────────────────────
  gsd-governance:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Validate machine-checkable wave evidence
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="docs/reports/gsd-wave-evidence"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            base_sha="origin/${{ github.base_ref }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi
          mapfile -t evidence_files < <(
            git diff --name-only "$base_sha...$head_sha" -- "$evidence_dir/*.rktd"
          )
          if [[ ${#evidence_files[@]} -ne 1 ]]; then
            echo "Expected exactly one changed wave evidence record; found ${#evidence_files[@]}"
            printf '  %s\n' "${evidence_files[@]:-<none>}"
            exit 1
          fi
          evidence="${evidence_files[0]}"
          content_digest=$(
            git diff --binary "$base_sha...$head_sha" -- . \
              ':(exclude)docs/reports/gsd-wave-evidence/**' \
              ':(exclude)docs/reports/gsd-wave-reviews/**' \
              ':(exclude)docs/reports/gsd-wave-validation/**' \
              | sha256sum | awk '{print $1}'
          )
          racket scripts/gsd-wave-gate.rkt "$evidence" \
            --content-digest "$content_digest" \
            --root . \
            --policy scripts/required-pr-checks.policy

  # ────────────────────────────────────────────────────────────
  # Gate 8: Release-readiness check (tag pushes only)
  # ────────────────────────────────────────────────────────────
  release-readiness:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Run fast suite with gate evidence
        run: racket scripts/run-tests.rkt --suite fast --record-gate-evidence

      - name: Run TUI suite with gate evidence
        run: racket scripts/run-tests.rkt --suite tui --record-gate-evidence

      - name: Run arch suite with gate evidence
        run: racket scripts/run-tests.rkt --suite arch --record-gate-evidence

      - name: Run workflows suite with gate evidence
        run: racket scripts/run-tests.rkt --suite workflows --record-gate-evidence

      - name: Strict release readiness check
        run: racket scripts/lint-release-readiness.rkt --strict

      - name: Triple-gate (3x full suite)
        run: racket scripts/run-tests.rkt --repeat 3 2>&1 | tee triple-gate.log

      - name: Triple-gate summary
        if: always()
        run: |
          echo "## Triple-Gate Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 triple-gate.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
