name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      racket-version:
        description: 'Racket version override (e.g. 8.11, 8.12)'
        required: false
        default: ''
        type: string

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Gate 1: Lint (< 30s) — fast feedback on every PR
  # ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-lint-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-lint-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Workflow YAML validation
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, glob, sys
          errors = []
          for f in glob.glob('.github/workflows/*.yml'):
            try: yaml.safe_load(open(f))
            except Exception as e: errors.append(f'{f}: {e}')
          for f in glob.glob('.github/actions/*/action.yml'):
            try: yaml.safe_load(open(f))
            except Exception as e: errors.append(f'{f}: {e}')
          if errors:
            for e in errors: print(f'ERROR: {e}')
            sys.exit(1)
          print('All workflows and actions valid YAML')
          "

      - name: Run all lint checks
        run: racket scripts/lint-all.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 1b: Lint alignment — fail if pre-commit and lint-all drift
  # ────────────────────────────────────────────────────────────
  lint-alignment:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-lint-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-lint-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}
      - name: Verify lint alignment
        run: racket scripts/check-lint-alignment.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 2: Test matrix — depends on lint passing
  # ────────────────────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            racket-version: '8.10'
          - os: ubuntu-latest
            racket-version: '8.11'
          - os: macos-latest
            racket-version: '8.10'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/racket
            ~/Library/Racket
          key: racket-pkgs-${{ matrix.os }}-${{ matrix.racket-version }}-${{ hashFiles('**/info.rkt') }}
          restore-keys: |
            racket-pkgs-${{ matrix.os }}-${{ matrix.racket-version }}-
            racket-pkgs-${{ matrix.os }}-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || matrix.racket-version }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Compile gate (all test modules)
        run: |
          find tests -name '*.rkt' -not -path '*/compiled/*' -print0 \
            | xargs -0 -n 1 -P 4 raco make

      - name: Run tests
        run: STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt --suite fast --jobs 4 2>&1 | tee test-output.log

      - name: Test failure summary
        if: failure()
        run: |
          echo "## Test Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 4 'FAILURE\|ERROR' test-output.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.os }}-${{ matrix.racket-version }}
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 2b: Security tier — sandbox/permission/safe-mode tests
  # ────────────────────────────────────────────────────────────
  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-security-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-security-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Run security test suite
        run: STRICT_TEST_RUNNER=1 racket scripts/run-tests.rkt --suite security --sequential 2>&1 | tee test-output.log

      - name: Upload security test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-output
          path: test-output.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Gate 3: Release dry-run — depends on lint passing
  # ────────────────────────────────────────────────────────────
  release-dry-run:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/racket
          key: racket-pkgs-release-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-release-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Build tarball (dry-run)
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          mkdir -p /tmp/q
          cp -r . /tmp/q/
          cd /tmp
          tar czf /tmp/q-${VERSION}.tar.gz \
            --exclude='.git' --exclude='compiled' --exclude='*.zo' q/
          echo "Tarball size: $(du -h /tmp/q-${VERSION}.tar.gz | cut -f1)"

      - name: Verify manifest generation
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          racket scripts/gen-release-manifest.rkt /tmp/q-${VERSION}.tar.gz > /tmp/manifest.json
          python3 -c "import json,sys; m=json.load(open('/tmp/manifest.json')); print(f'Manifest valid: version={m[\"version\"]}')"

      - name: Verify release notes generation
        run: |
          VERSION=$(racket -e '(require "util/version.rkt") (display q-version)')
          racket scripts/gen-release-notes.rkt "${VERSION}" > /tmp/notes.md
          echo "Release notes generated ($(wc -l < /tmp/notes.md) lines)"

  # ────────────────────────────────────────────────────────────
  # Gate 4: Smoke — depends on lint only (not test)
  # ────────────────────────────────────────────────────────────
  smoke:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/racket
            ~/Library/Racket
          key: racket-pkgs-smoke-${{ matrix.os }}-${{ hashFiles('**/info.rkt') }}
          restore-keys: racket-pkgs-smoke-${{ matrix.os }}-
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Version smoke check
        run: |
          output=$(racket main.rkt --version)
          echo "$output"
          echo "$output" | grep -qE '^q version [0-9]+\.[0-9]+\.[0-9]+$'

      - name: Help smoke check
        run: |
          output=$(racket main.rkt --help)
          echo "$output"
          echo "$output" | grep -qE '^Usage:'

      - name: Provider compilation smoke tests
        run: raco test tests/test-provider-smoke.rkt

  # ────────────────────────────────────────────────────────────
  # Gate 5: Inter-wave gate — fast-suite on every PR (v0.56.1)
  # ────────────────────────────────────────────────────────────
  inter-wave-gate:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Clear stale bytecode
        run: find . -name compiled -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Fast test suite (inter-wave gate)
        run: racket scripts/run-tests.rkt --suite fast --jobs 4 2>&1 | tee test-output.log

      - name: Test failure summary
        if: failure()
        run: |
          echo "## Inter-Wave Gate Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 4 'FAILURE\|ERROR' test-output.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # Gate 6: Release-readiness check (v0.56.1)
  # ────────────────────────────────────────────────────────────
  release-readiness:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-racket
        with:
          racket-version: ${{ github.event.inputs.racket-version || '8.10' }}

      - name: Release readiness check
        run: racket scripts/lint-release-readiness.rkt

      - name: Triple-gate (3x full suite)
        run: racket scripts/run-tests.rkt --repeat 3 2>&1 | tee triple-gate.log

      - name: Triple-gate summary
        if: always()
        run: |
          echo "## Triple-Gate Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 triple-gate.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
