name: Post-Release Smoke Test

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarball
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Retry: Release workflow may still be uploading the tarball
          ASSET_URL=""
          for i in $(seq 1 20); do
            ASSET_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" \
              | jq -r '.assets[] | select(.name=="q-'"${VERSION}"'.tar.gz") | .url')
            if [ -n "$ASSET_URL" ]; then
              echo "Found tarball asset (attempt $i)"
              break
            fi
            echo "Waiting for tarball asset (attempt $i)..."
            sleep 15
          done
          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: tarball asset not found in release ${TAG} after 20 retries"
            exit 1
          fi
          # Download using authenticated API endpoint
          curl -sL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            -o "q-${VERSION}.tar.gz" "$ASSET_URL"
          ls -la "q-${VERSION}.tar.gz"
          file "q-${VERSION}.tar.gz"

      - name: Install Racket
        run: |
          curl -L https://download.racket-lang.org/installers/8.10/racket-8.10-x86_64-linux-cs.sh -o /tmp/racket.sh
          echo "2" | sudo sh /tmp/racket.sh --in-place --create-links /usr/local

      - name: Extract and install
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          tar xzf "q-${VERSION}.tar.gz"
          # Tarball may extract to q/ or q-${VERSION}/ — normalize to q/
          if [ -d "q-${VERSION}" ]; then
            mv "q-${VERSION}" q
          fi
          cd q
          raco pkg install --auto --batch
          echo "Q_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Verify q --version
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          cd q
          OUTPUT=$(racket main.rkt --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "version ${VERSION}"

      - name: Verify manifest
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          cd q
          if [ -f release-manifest.json ]; then
            python3 -c "
          import json, sys
          m = json.load(open('release-manifest.json'))
          assert m['version'] == '${VERSION}', f\"manifest version {m['version']} != expected ${VERSION}\"
          print(f'Manifest OK: version={m[\"version\"]}')
          "
          else
            echo "No release-manifest.json found (optional)"
          fi

      - name: Run full test suite
        run: |
          VERSION="${{ steps.download.outputs.VERSION }}"
          cd q
          racket scripts/run-tests.rkt
