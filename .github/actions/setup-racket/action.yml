name: 'Setup Racket'
description: 'Install Racket with caching and dependencies'
inputs:
  racket-version:
    description: 'Racket version to install'
    required: false
    default: '8.10'
runs:
  using: 'composite'
  steps:
    - name: Clean stale compiled bytecode
      shell: bash
      run: find . -name '*.zo' -delete -o -name 'compiled' -type d -exec rm -rf {} + 2>/dev/null; true

    - name: Cache Racket packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.racket
          ./compiled
        key: racket-${{ runner.os }}-${{ inputs.racket-version }}-${{ hashFiles('info.rkt') }}
        restore-keys: |
          racket-${{ runner.os }}-${{ inputs.racket-version }}-

    - name: Install Racket
      uses: Bogdanp/setup-racket@v1.15
      with:
        version: ${{ inputs.racket-version }}

    - name: Install dependencies
      shell: bash
      run: |
        # Idempotent local package setup: install if absent, update if present.
        # Use $PWD instead of '.' to avoid macOS "invalid package source" errors.
        if raco pkg show q 2>/dev/null | grep -q "q"; then
          echo "Package q already installed, updating..."
          raco pkg update --auto q
        else
          echo "Installing local package from $PWD ..."
          raco pkg install --auto --batch "$PWD"
        fi
        # TUI uses native Racket implementations (no external deps needed)
