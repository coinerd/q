name: 'Setup Racket'
description: 'Install Racket with caching and dependencies'
inputs:
  racket-version:
    description: 'Racket version to install'
    required: false
    default: '8.10'
runs:
  using: 'composite'
  steps:
    - name: Install Racket via apt (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq racket racket-common
        echo "Installed: $(racket --version)"
        raco --version

    - name: Install Racket (macOS)
      if: runner.os == 'macOS'
      uses: Bogdanp/setup-racket@v1.15
      with:
        racket-version: ${{ inputs.racket-version }}

    - name: Clean stale compiled bytecode
      shell: bash
      run: find . -name '*.zo' -delete -o -name 'compiled' -type d -exec rm -rf {} + 2>/dev/null; true

    - name: Install dependencies
      shell: bash
      run: |
        raco pkg install --auto --batch
        raco pkg install --auto --batch tui-term tui-ubuf 2>/dev/null || true
